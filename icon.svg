<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sunG" cx="42%" cy="34%" r="72%">
      <stop offset="0%"  stop-color="#fff3c4"/>
      <stop offset="45%" stop-color="#ffd257"/>
      <stop offset="100%" stop-color="#ff9d21"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ffca4a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffca4a" stop-opacity="0"/>
    </radialGradient>
    <!-- frosted glass body: translucent, brighter at the top edge -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity=".97"/>
      <stop offset="45%"  stop-color="#f2f7ff" stop-opacity=".80"/>
      <stop offset="100%" stop-color="#cfe0f5" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity=".70"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soften" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#123a63" flood-opacity=".22"/>
    </filter>
    <clipPath id="cloudClip">
      <path d="M168 406a80 80 0 0 1-8-159 114 114 0 0 1 218-25 72 72 0 0 1 18 184z"/>
    </clipPath>
  </defs>

  <!-- transparent canvas: no background rect -->
  <g filter="url(#lift)">
    <!-- sun: larger, no rays, tucked behind the cloud -->
    <circle cx="196" cy="176" r="112" fill="url(#sunGlow)" filter="url(#soften)"/>
    <circle cx="196" cy="176" r="92" fill="url(#sunG)"/>
    <circle cx="196" cy="176" r="92" fill="none" stroke="#ffffff" stroke-opacity=".45" stroke-width="3"/>

    <!-- frosted glass cloud -->
    <g>
      <path d="M168 406a80 80 0 0 1-8-159 114 114 0 0 1 218-25 72 72 0 0 1 18 184z" fill="url(#glassBody)"/>
      <g clip-path="url(#cloudClip)">
        <ellipse cx="150" cy="235" rx="190" ry="86" fill="url(#sheen)"/>
        <ellipse cx="330" cy="415" rx="150" ry="60" fill="#9fc3e8" opacity=".22"/>
      </g>
      <path d="M168 406a80 80 0 0 1-8-159 114 114 0 0 1 218-25 72 72 0 0 1 18 184z"
            fill="none" stroke="url(#rim)" stroke-width="3.5"/>
    </g>
  </g>
</svg>
