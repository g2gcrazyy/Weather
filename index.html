<!--
  Personal weather app — Apple Weather-style UI, pluggable data source.

  SOURCES
  -------
  'gem' : Environment Canada GEM/HRDPS model via Open-Meteo (CORS JSON, no key). Works now.
  'twn' : The Weather Network / Pelmorex — public API (weatherapi.pelmorex.com/api/v1),
          wildcard CORS, no proxy, no login. shortterm + longterm + averages feeds.
          For personal, non-redistributed use.

  This is a personal, non-redistributed frontend. Data stays on your machine.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Weather</title>

<!-- Home-screen / PWA install (relative paths so it works in a GitHub Pages subfolder) -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Weather">
<meta name="application-name" content="Weather">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2a4d6e">
<style>
  :root {
    --ink:#fff; --ink-dim:rgba(255,255,255,.62); --ink-faint:rgba(255,255,255,.38);
    --card:rgba(255,255,255,.14); --card-line:rgba(255,255,255,.16);
    --blur:saturate(140%) blur(20px); --g-top:#2a4d6e; --g-bot:#6a7f97;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  /* Gradient lives on <html> so iOS rubber-band overscroll reveals it, not white.
     background-color is the solid fallback the overscroll area is filled with. */
  html {
    background:linear-gradient(180deg,var(--g-top) 0%,var(--g-bot) 100%) no-repeat fixed;
    background-color:var(--g-bot);
    transition:background-color 1.2s ease;
    /* rubber-band scrolling stays ON — the gradient + background-color live here,
       so the springy overscroll area shows sky, never white. */
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:transparent;
    min-height:100%; overscroll-behavior-y:contain;   /* keep the spring, block browser pull-to-refresh */
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #bg { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; display:block; }
  .ptr { position:fixed; top:0; left:0; right:0; z-index:5; display:flex; justify-content:center;
    pointer-events:none; opacity:0; transform:translateY(-42px); }
  .ptr .ring { width:28px; height:28px; margin-top:12px; border-radius:50%;
    border:2.5px solid rgba(255,255,255,.32); border-top-color:#fff;
    background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
  .ptr.spin .ring { animation:spin .8s linear infinite; }

  .wrap { max-width:480px; margin:0 auto; padding:14px 16px 40px; position:relative; z-index:1; }

  .srcbar { display:flex; gap:6px; margin:22px 0 0; }
  .srcbar button { flex:1; background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--card-line); color:var(--ink-dim); font-size:12px; font-weight:600; padding:8px 4px; border-radius:10px; cursor:pointer; white-space:nowrap; }
  .srcbar button.on { color:var(--ink); background:rgba(255,255,255,.24); }

  .topbar { position:relative; margin-bottom:10px; min-height:38px; }
  .iconrowbtns { display:flex; gap:8px; }
  .iconbtn { width:38px; height:38px; border-radius:50%; cursor:pointer;
    background:var(--card); border:1px solid var(--card-line); color:var(--ink);
    backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    line-height:0; display:flex; align-items:center; justify-content:center; padding:0; }
  .iconbtn svg { width:23px; height:23px; }
  .iconbtn:hover { background:rgba(255,255,255,.24); }
  .topbar .searchbar { display:none; }
  .topbar.open .searchbar { display:block; }
  .topbar.open .iconrowbtns { display:none; }

  .searchbar { position:relative; }
  .searchbar input { width:100%; border:none; outline:none; background:var(--card);
    backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); color:var(--ink); font-size:16px;
    padding:11px 40px 11px 38px; border-radius:12px; border:1px solid var(--card-line); }
  .searchbar input::placeholder { color:var(--ink-faint); }
  .searchbar .mag { position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.55; font-size:15px; }
  .searchbar .loc { position:absolute; right:7px; top:50%; transform:translateY(-50%); background:none; border:none;
    color:var(--ink); opacity:.7; cursor:pointer; padding:6px; line-height:0; }
  .searchbar .loc:hover { opacity:1; }
  .searchbar .loc svg { width:17px; height:17px; }
  .results { position:absolute; z-index:20; left:0; right:0; top:48px; background:rgba(30,40,55,.86); backdrop-filter:var(--blur); border-radius:12px; overflow:hidden; border:1px solid var(--card-line); }
  .results button { display:block; width:100%; text-align:left; background:none; border:none; color:var(--ink); padding:11px 14px; font-size:15px; cursor:pointer; }
  .results button:hover { background:rgba(255,255,255,.1); }
  .results .sub { color:var(--ink-dim); font-size:13px; }

  .hero { text-align:center; padding:22px 0 8px; }
  .hero .city { font-size:33px; font-weight:400; letter-spacing:.2px; }
  .hero .temp { font-size:92px; font-weight:200; line-height:1; margin:2px 0 0 8px; }
  .hero .cond { font-size:19px; color:var(--ink-dim); font-weight:500; }
  .hero .hl { font-size:19px; font-weight:500; margin-top:2px; }
  .hero .feels { font-size:15px; color:var(--ink-dim); margin-top:3px; }

  .card { background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--card-line); border-radius:16px; margin-top:12px; overflow:hidden; }
  .card .cap { font-size:12.5px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-dim); padding:12px 14px 0; }

  .narr { padding:12px 14px 14px; font-size:15px; line-height:1.45; color:var(--ink); }

  .hourly { display:flex; gap:2px; overflow-x:auto; padding:12px 8px 10px; cursor:grab; scroll-behavior:smooth;
    scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.4) transparent; }
  .hourly.drag { cursor:grabbing; scroll-behavior:auto; user-select:none; }
  .hourly::-webkit-scrollbar { height:6px; }
  .hourly::-webkit-scrollbar-thumb { background:rgba(255,255,255,.4); border-radius:3px; }
  .hourly::-webkit-scrollbar-track { background:transparent; }
  .hour { flex:0 0 auto; width:58px; text-align:center; }
  .hour .h { font-size:14px; color:var(--ink-dim); font-weight:600; }
  .hour .i { margin:6px 0 3px; line-height:0; }
  .hour .t { font-size:18px; font-weight:500; }
  .hour .p { font-size:11px; color:#8fd0ff; height:13px; }
  .hour.sunev .t { font-size:12px; color:var(--ink-dim); font-weight:600; }

  .day { display:grid; grid-template-columns:52px 28px 40px 1fr 40px; align-items:center; gap:9px; padding:10px 14px; cursor:pointer; }
  .day + .day, .dayx + .day { border-top:1px solid rgba(255,255,255,.08); }
  .day:hover { background:rgba(255,255,255,.06); }
  .day .dn { font-size:17px; font-weight:600; }
  .day .di { text-align:center; line-height:0; }
  .day .lo,.day .hi { font-size:17px; }
  .day .lo { color:var(--ink-dim); text-align:right; }
  .day .hi { text-align:left; }
  .track { height:5px; border-radius:3px; background:rgba(255,255,255,.18); position:relative; }
  .fill { position:absolute; height:100%; border-radius:3px; background:linear-gradient(90deg,#7bd0ff,#ffd479,#ff8a5c); }
  .dot { position:absolute; top:50%; width:7px; height:7px; margin:-3.5px 0 0 -3.5px; border-radius:50%; background:#fff; box-shadow:0 0 0 2px rgba(0,0,0,.18); }

  /* expanded day detail */
  .dayx { padding:2px 14px 14px; background:rgba(0,0,0,.14); }
  .dayx .cond { font-size:15px; margin:4px 0 10px; }
  .dayx .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
  .dayx .r { display:flex; justify-content:space-between; font-size:14px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.08); }
  .dayx .r span:first-child { color:var(--ink-dim); }
  .dayx .r.sr { grid-column:1; }   /* keep Sunrise/Sunset paired regardless of missing fields */
  .dayx .nohr { font-size:13px; color:var(--ink-faint); padding:10px 0 2px; }
  .dayx .chart { display:block; width:100%; height:118px; overflow:visible; }
  .iconrow { position:relative; height:26px; margin:2px 0 -2px; }
  .iconrow .ic { position:absolute; top:0; transform:translateX(-50%); line-height:0; }
  .iconrow .ic svg.wx { width:18px; height:18px; }
  svg.wx { display:inline-block; vertical-align:middle; }
  .hour .i svg.wx { width:30px; height:30px; }
  .day .di svg.wx { width:26px; height:26px; }
  .dayx .cap { font-size:12px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-dim); }

  /* scrollable charts */
  .cscroll { overflow-x:auto; cursor:grab; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.4) transparent; padding:4px 14px 12px; }
  .cscroll.drag { cursor:grabbing; user-select:none; }
  .cscroll::-webkit-scrollbar { height:6px; }
  .cscroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.4); border-radius:3px; }
  .cscroll::-webkit-scrollbar-track { background:transparent; }
  .crow { display:flex; }
  .crow > div { flex:0 0 auto; text-align:center; }
  .ctime { font-size:13px; color:var(--ink-dim); font-weight:600; padding-bottom:3px; }
  .cicon { font-size:21px; padding-bottom:2px; }

  .tiles { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .tile { background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid var(--card-line); border-radius:16px; padding:12px 14px 14px; min-height:96px; }
  .tile .cap { font-size:12px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-dim); }
  .tile .big { font-size:27px; font-weight:300; margin-top:6px; }
  .tile .note { font-size:13px; color:var(--ink-dim); margin-top:4px; }

  .unitbar { display:flex; justify-content:center; gap:0; margin:10px auto 0; width:132px;
    background:var(--card); border:1px solid var(--card-line); border-radius:11px; overflow:hidden;
    backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
  .unitbar button { flex:1; background:none; border:none; color:var(--ink-dim);
    font-size:14px; font-weight:600; padding:9px 0; cursor:pointer; }
  .unitbar button.on { color:var(--ink); background:rgba(255,255,255,.24); }

  .foot { text-align:center; color:var(--ink-faint); font-size:12px; margin-top:20px; line-height:1.5; }
  .setup { background:rgba(0,0,0,.22); border:1px solid var(--card-line); border-radius:14px; padding:14px 16px; margin-top:12px; font-size:13.5px; line-height:1.5; color:var(--ink-dim); }
  .setup b { color:var(--ink); }
  .setup code { background:rgba(255,255,255,.12); padding:1px 5px; border-radius:4px; font-size:12.5px; }

  .msg { text-align:center; padding:60px 20px; color:var(--ink-dim); }
  .spinner { width:26px; height:26px; border:3px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; margin:0 auto 14px; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (prefers-reduced-motion:reduce){ .spinner{ animation:none; } body{ transition:none; } }
</style>

<canvas id="bg" aria-hidden="true"></canvas>
<div class="ptr" id="ptr" aria-hidden="true"><div class="ring"></div></div>
<div class="wrap">
  <div class="topbar" id="topbar">
    <div class="iconrowbtns">
      <button class="iconbtn" id="btn-search" title="Search" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round">
          <circle cx="10.5" cy="10.5" r="6.6"/><line x1="15.4" y1="15.4" x2="20.5" y2="20.5"/></svg>
      </button>
      <button class="iconbtn" id="geo" title="Use my location" aria-label="Use my location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="6.4"/><circle cx="12" cy="12" r="1.9" fill="currentColor" stroke="none"/>
          <line x1="12" y1="1.6" x2="12" y2="4.4"/><line x1="12" y1="19.6" x2="12" y2="22.4"/>
          <line x1="1.6" y1="12" x2="4.4" y2="12"/><line x1="19.6" y1="12" x2="22.4" y2="12"/></svg>
      </button>
    </div>
    <div class="searchbar">
      <span class="mag">&#8981;</span>
      <input id="q" type="text" placeholder="Search city or town" autocomplete="off" spellcheck="false">
      <button class="loc" id="clear" title="Clear search" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="6.5" y1="6.5" x2="17.5" y2="17.5"/><line x1="17.5" y1="6.5" x2="6.5" y2="17.5"/></svg>
      </button>
      <div class="results" id="results" style="display:none"></div>
    </div>
  </div>
  <div id="app"><div class="msg"><div class="spinner"></div>Getting your weather&#8230;</div></div>
  <div class="srcbar">
    <button id="src-gem">Env. Canada</button>
    <button id="src-twn">Weather Network</button>
    <button id="src-comb" class="on">Combined</button>
  </div>
  <div class="unitbar">
    <button id="u-c" class="on">&deg;C</button><button id="u-f">&deg;F</button>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ============================ CONFIG ============================ */
const CONFIG = {
  source: 'comb',           // default: Combined (TWN + ECCC precip); saved choice overrides
  twn: {                    // Pelmorex API — public, wildcard CORS, no proxy, no login.
    base: 'https://weatherapi.pelmorex.com/api/v1',
    shortterm: '/shortterm',                    // 6-hourly (fallback for the strip / current)
    hourly:    '/hourly',                        // TRUE 1-hourly JSON, wildcard CORS, no proxy
    observation: '/observation',                 // live measured current conditions (best "now")
    longterm:  '/longterm',                     // 7/14-day (paste its response to finalize mapping)
    averages:  '/historical/averages/daily',    // climate normals -> "normal" line
    count: 40,                                   // shortterm periods (40 x 6h = 10 days) -> per-day charts beyond 72h
    hourCount: 72,                               // hours to pull from /hourly (feeds per-day charts)
    minCount: 28,                                // never fewer than 28 periods (7 days x 4) of 6h data
    hourlyPage: '',                              // OPTIONAL true-hourly: URL that returns the TWN hourly
                                                 //   PAGE (its <script ld+json> holds 72x1h). Needs a proxy
                                                 //   (main site isn't wildcard-CORS). Blank -> use 6h shortterm.
  },
};
/* =============================================================== */

const $ = s => document.querySelector(s);
const app = $('#app');
let lastCoords = { lat:null, lon:null, name:null };
let CURRENT_F = null, CURRENT_RAW = null;

/* ---- saved preferences (source + last city). Falls back to memory if storage is blocked. ---- */
let UNIT='C';                                  // 'C' | 'F' — display only; data stays metric
const toF   = v => v==null||isNaN(v) ? v : v*9/5+32;
const toMph = v => v==null||isNaN(v) ? v : v*0.621371;   // km/h -> mph
const toInHg= v => v==null||isNaN(v) ? v : v*0.0295300;  // hPa  -> inHg
const toIn  = v => v==null||isNaN(v) ? v : v/25.4;       // mm   -> in
const toMi  = v => v==null||isNaN(v) ? v : v*0.621371;   // km   -> mi
/* Unit labels + precision for the current display system. */
const U = () => UNIT==='F'
  ? { wind:'mph', press:'inHg', pressDp:2, precip:'in',  precipDp:2, vis:'mi' }
  : { wind:'km/h', press:'hPa', pressDp:0, precip:'mm', precipDp:1, vis:'km' };
const conv = v => UNIT==='F' ? toF(v) : v;
/* Convert a normalized model for display, keeping Celsius in *C fields for the heat colours. */
function toDisplayUnits(f){
  if(UNIT!=='F') return f;
  const pt = e => ({...e, tempC:e.temp, temp:toF(e.temp), feelsLike:toF(e.feelsLike), dewPoint:toF(e.dewPoint),
                    windSpeed:toMph(e.windSpeed), gust:toMph(e.gust), pressure:toInHg(e.pressure)});
  return {...f,
    current:{...f.current, tempC:f.current.temp, temp:toF(f.current.temp),
             feelsLike:toF(f.current.feelsLike), dewPoint:toF(f.current.dewPoint),
             windSpeed:toMph(f.current.windSpeed), gust:toMph(f.current.gust),
             pressure:toInHg(f.current.pressure), visibility:toMi(f.current.visibility)},
    hourly:(f.hourly||[]).map(pt),
    periods:(f.periods||[]).map(pt),
    daily:(f.daily||[]).map(d=>({...d, hiC:d.hi, loC:d.lo, hi:toF(d.hi), lo:toF(d.lo),
             feelsHi:toF(d.feelsHi), feelsLo:toF(d.feelsLo),
             precip:toIn(d.precip), windMax:toMph(d.windMax)})),
    normal:f.normal?{hi:toF(f.normal.hi), lo:toF(f.normal.lo)}:null,
  };
}

const PREF_KEY='weatherapp.prefs';
let memPrefs=null;
function loadPrefs(){
  if(memPrefs) return memPrefs;
  try{ const raw=localStorage.getItem(PREF_KEY); memPrefs=raw?JSON.parse(raw):{}; }
  catch(e){ memPrefs={}; }
  return memPrefs;
}
function savePrefs(p){
  memPrefs={...loadPrefs(),...p};
  try{ localStorage.setItem(PREF_KEY,JSON.stringify(memPrefs)); }catch(e){}
}

/* Custom SVG weather icons (original artwork, drawn to sit with the app's style). */
const ICO = {
  sun:`<circle cx="16" cy="16" r="6.4" fill="url(#gsun)"/>`+
      [0,45,90,135,180,225,270,315].map(a=>`<rect x="15.1" y="1.6" width="1.8" height="4.4" rx=".9" fill="#ffcf4d" transform="rotate(${a} 16 16)"/>`).join(''),
  moon:`<path d="M21.6 19.9A8.2 8.2 0 0 1 12.1 8.5a8.6 8.6 0 1 0 9.5 11.4z" fill="url(#gmoon)"/>`,
  cloud:(x,y,sc,a,b)=>`<g transform="translate(${x} ${y}) scale(${sc})"><path d="M8.6 22.4a5.1 5.1 0 0 1-.5-10.1 7.3 7.3 0 0 1 13.9-1.6 4.6 4.6 0 0 1 1.2 11.7z" fill="url(#${a})" stroke="${b}" stroke-width=".7"/></g>`,
};
function svgIcon(inner,extraDefs){
  return `<svg class="wx" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="gsun" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#ffb531"/></linearGradient>
    <linearGradient id="gmoon" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fdfdff"/><stop offset="100%" stop-color="#c9d4e8"/></linearGradient>
    <linearGradient id="gcl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#d3dced"/></linearGradient>
    <linearGradient id="gcd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c3ccdc"/><stop offset="100%" stop-color="#93a0b5"/></linearGradient>
    ${extraDefs||''}</defs>${inner}</svg>`;
}
const drop=(x,y,c)=>`<path d="M${x} ${y}c1.5 1.9 2.2 3 2.2 3.9a2.2 2.2 0 0 1-4.4 0c0-.9.7-2 2.2-3.9z" fill="${c}"/>`;
const flake=(x,y)=>`<g stroke="#dff0ff" stroke-width="1.5" stroke-linecap="round">
  <line x1="${x}" y1="${y-2.2}" x2="${x}" y2="${y+2.2}"/>
  <line x1="${x-1.9}" y1="${y-1.1}" x2="${x+1.9}" y2="${y+1.1}"/>
  <line x1="${x-1.9}" y1="${y+1.1}" x2="${x+1.9}" y2="${y-1.1}"/></g>`;

const SKY_SVG = {
  clear:  d => d ? svgIcon(ICO.sun) : svgIcon(ICO.moon),
  cloud:  d => svgIcon(
    (d ? `<g transform="translate(6 -3) scale(.62)">${ICO.sun}</g>`
       : `<g transform="translate(7 -2) scale(.62)">${ICO.moon}</g>`)
    + ICO.cloud(0,3,1,'gcl','rgba(120,135,160,.35)')),
  overcast: () => svgIcon(
    `<g opacity=".55" transform="translate(4 -3.5) scale(.8)">${ICO.cloud(0,3,1,'gcd','none')}</g>`
    + ICO.cloud(0,4,1,'gcl','rgba(120,135,160,.35)')),
  rain:   () => svgIcon(ICO.cloud(0,-1,1,'gcd','none')
    + drop(10.5,22,'#7ec6ff') + drop(16,23.5,'#7ec6ff') + drop(21.5,22,'#7ec6ff')),
  snow:   () => svgIcon(ICO.cloud(0,-1,1,'gcd','none')
    + flake(10.5,24) + flake(16,25.6) + flake(21.5,24)),
  storm:  () => svgIcon(ICO.cloud(0,-2,1,'gcd','none')
    + `<path d="M17.4 19.2 12.6 26h3.3l-1.1 5 5.3-7.6h-3.4z" fill="#ffd257"/>`),
  fog:    () => svgIcon(ICO.cloud(0,-3,1,'gcl','rgba(120,135,160,.35)')

const GRAD = {
  day:{ clear:['#3b7dd8','#8fc3f0'], cloud:['#5b6b7d','#96a3b3'], rain:['#3f5566','#6d7f8e'], snow:['#63768a','#aab8c6'], storm:['#2b3440','#5a5f6b'], fog:['#5b6b7d','#96a3b3'] },
  night:{ clear:['#0e1a33','#2a3a5c'], cloud:['#232c38','#3d4756'], rain:['#1c2733','#374350'], snow:['#28313f','#454f5e'], storm:['#12161d','#2c3038'], fog:['#232c38','#3d4756'] },
};
/* =====================================================================
   Animated condition background (procedural canvas — stars, clouds,
   sun/moon, rain, snow, fog, lightning). Stylised, not photoreal.
===================================================================== */
const BG=(()=>{
  const cv=document.getElementById('bg');
  if(!cv) return { set(){} };
  const ctx=cv.getContext('2d');
  const reduce=window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W=0,H=0,DPR=1, raf=null, t0=performance.now();
  let scene={sky:'cloud',isDay:true,cover:50};
  let stars=[],clouds=[],drops=[],flakes=[],fog=[],flash={t:-1e9,next:4000};
  const rnd=(a,b)=>a+Math.random()*(b-a);

  function size(){
    DPR=Math.min(2,window.devicePixelRatio||1);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    build();
  }

  function build(){
    const {sky,isDay,cover}=scene;
    // stars only at night, fewer when cloudy
    const starN = !isDay ? Math.round((sky==='clear'?150:sky==='cloud'?70:20)) : 0;
    stars=Array.from({length:starN},()=>({x:rnd(0,W),y:rnd(0,H*0.72),r:rnd(0.4,1.5),
      p:rnd(0,Math.PI*2), sp:rnd(0.6,2.2), b:rnd(0.35,1)}));
    // clouds scale with condition + reported cover
    const base={clear:0,cloud:3,rain:6,snow:5,storm:7,fog:3}[sky] ?? 3;
    const n=Math.max(0, Math.round(base*(sky==='clear'?1:(0.55+ (cover??50)/100*0.9))));
    clouds=Array.from({length:n},(_,i)=>({
      x:rnd(-0.2,1.2)*W, y:rnd(0.04,0.5)*H, s:rnd(0.55,1.35),
      v:rnd(4,13)*(sky==='storm'?1.7:1)/60, o:rnd(0.35,0.8),
      puffs:Array.from({length:5+Math.floor(Math.random()*3)},()=>({
        dx:rnd(-70,70), dy:rnd(-16,16), r:rnd(26,54)}))
    }));
    const rainN = sky==='rain'?170 : sky==='storm'?260 : 0;
    drops=Array.from({length:rainN},()=>({x:rnd(0,W),y:rnd(0,H),l:rnd(9,20),v:rnd(430,760)/60,o:rnd(.25,.6)}));
    const snowN = sky==='snow'?150:0;
    flakes=Array.from({length:snowN},()=>({x:rnd(0,W),y:rnd(0,H),r:rnd(1,2.9),
      v:rnd(28,70)/60, a:rnd(0,Math.PI*2), sw:rnd(.4,1.5)}));
    fog = sky==='fog' ? Array.from({length:5},(_,i)=>({y:H*(0.35+i*0.13), o:rnd(.10,.20),
      v:rnd(5,14)/60, x:rnd(-W,0), w:rnd(1.3,2.2)})) : [];
  }

  function sun(x,y,day){
    const R=day?54:40;
    const glow=ctx.createRadialGradient(x,y,0,x,y,R*5.5);
    if(day){ glow.addColorStop(0,'rgba(255,236,170,.55)'); glow.addColorStop(.35,'rgba(255,206,110,.16)');
             glow.addColorStop(1,'rgba(255,200,90,0)'); }
    else   { glow.addColorStop(0,'rgba(226,236,255,.30)'); glow.addColorStop(1,'rgba(200,220,255,0)'); }
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,R*5.5,0,7); ctx.fill();
    const core=ctx.createRadialGradient(x-R*.25,y-R*.25,R*.1,x,y,R);
    if(day){ core.addColorStop(0,'#fffdf2'); core.addColorStop(.55,'#ffe9a3'); core.addColorStop(1,'rgba(255,205,95,.85)'); }
    else   { core.addColorStop(0,'#ffffff'); core.addColorStop(1,'rgba(214,228,255,.9)'); }
    ctx.fillStyle=core; ctx.beginPath(); ctx.arc(x,y,R,0,7); ctx.fill();
    if(!day){ // carve a crescent
      ctx.save(); ctx.globalCompositeOperation='destination-out';
      ctx.beginPath(); ctx.arc(x+R*.42,y-R*.30,R*.92,0,7); ctx.fill(); ctx.restore();
    }
  }
  function lensFlare(x,y){
    const cx=W/2, cy=H*0.52, dx=cx-x, dy=cy-y;
    const spots=[[0.45,26,'rgba(255,225,160,.10)'],[0.78,15,'rgba(180,255,220,.09)'],
                 [1.15,34,'rgba(255,190,150,.08)'],[1.5,10,'rgba(200,215,255,.10)']];
    for(const [k,r,col] of spots){
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x+dx*k,y+dy*k,r,0,7); ctx.fill();
    }
  }
  function cloud(c,day,sky){
    const dark = sky==='storm'?1 : sky==='rain'?.72 : sky==='snow'?.5 : 0;
    for(const p of c.puffs){
      const R=p.r*c.s, X=c.x+p.dx*c.s, Y=c.y+p.dy*c.s;
      const g=ctx.createRadialGradient(X,Y-R*.25,R*.15,X,Y,R);
      const hi = day ? [255,255,255] : [188,200,220];
      const lo = day ? [214,226,244] : [120,132,155];
      const mix=(a,b,k)=>a.map((v,i)=>Math.round(v+(b[i]-v)*k));
      const top=mix(hi,[120,128,145],dark*.55), bot=mix(lo,[70,78,95],dark*.6);
      g.addColorStop(0,`rgba(${top.join(',')},${c.o})`);
      g.addColorStop(1,`rgba(${bot.join(',')},0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(X,Y,R,0,7); ctx.fill();
    }
  }

  function draw(now){
    const dt=Math.min(50,now-t0); t0=now;
    const k=dt/16.67;                                   // frame-rate normaliser
    const {sky,isDay}=scene;
    ctx.clearRect(0,0,W,H);

    if(!isDay && stars.length){
      for(const s of stars){
        s.p+=0.02*s.sp*k;
        const a=s.b*(0.55+0.45*Math.sin(s.p));
        ctx.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
      }
    }
    if(sky==='clear'||sky==='cloud'){
      const x=W*0.74, y=H*0.16;
      sun(x,y,isDay);
      if(isDay && sky==='clear') lensFlare(x,y);
    }
    for(const c of clouds){
      cloud(c,isDay,sky);
      c.x+=c.v*k; if(c.x-160*c.s>W) c.x=-160*c.s;
    }
    if(fog.length){
      for(const f of fog){
        const g=ctx.createLinearGradient(0,f.y-40,0,f.y+40);
        g.addColorStop(0,'rgba(226,234,244,0)');
        g.addColorStop(.5,`rgba(226,234,244,${f.o})`);
        g.addColorStop(1,'rgba(226,234,244,0)');
        ctx.fillStyle=g; ctx.fillRect(0,f.y-40,W,80);
        f.x+=f.v*k; if(f.x>W) f.x=-W;
      }
    }
    if(drops.length){
      ctx.lineCap='round';
      for(const d of drops){
        ctx.strokeStyle=`rgba(200,225,255,${d.o})`; ctx.lineWidth=1.1;
        ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2.5,d.y+d.l); ctx.stroke();
        d.y+=d.v*k*1.6; d.x-=0.25*k;
        if(d.y>H){ d.y=-20; d.x=rnd(0,W); }
      }
    }
    if(flakes.length){
      for(const f of flakes){
        f.a+=0.03*k; f.y+=f.v*k; f.x+=Math.sin(f.a)*f.sw*k*0.6;
        if(f.y>H){ f.y=-8; f.x=rnd(0,W); }
        ctx.fillStyle='rgba(255,255,255,.85)';
        ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill();
      }
    }
    if(sky==='storm'){
      if(now-flash.t>flash.next){ flash.t=now; flash.next=rnd(3500,9000); }
      const age=now-flash.t;
      if(age<260){
        const a=(age<70?age/70:1-(age-70)/190)*0.35;
        if(a>0){ ctx.fillStyle=`rgba(255,255,255,${a.toFixed(3)})`; ctx.fillRect(0,0,W,H); }
      }
    }
    raf=requestAnimationFrame(draw);
  }

  function start(){ if(raf) return; t0=performance.now(); raf=requestAnimationFrame(draw); }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }

  addEventListener('resize',()=>{ size(); },{passive:true});
  document.addEventListener('visibilitychange',()=>{ document.hidden?stop():(reduce?draw(performance.now()):start()); });
  size();
  if(reduce) draw(performance.now()); else start();     // static single frame if motion is reduced

  return { set(sky,isDay,cover){
    scene={sky:sky||'cloud', isDay:!!isDay, cover:(cover==null?50:cover)};
    size();
    if(reduce){ stop(); draw(performance.now()); }
  }};
})();

function paint(sky,isDay){ const g=GRAD[isDay?'day':'night'][sky]||GRAD.day.cloud;
  const r=document.documentElement;
  r.style.setProperty('--g-top',g[0]); r.style.setProperty('--g-bot',g[1]);
  const m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute('content',g[0]); }

const WMO = {
  0:['Clear','clear'],1:['Mainly Clear','clear'],2:['Partly Cloudy','cloud'],3:['Overcast','cloud'],
  45:['Fog','fog'],48:['Freezing Fog','fog'],51:['Light Drizzle','rain'],53:['Drizzle','rain'],55:['Heavy Drizzle','rain'],
  56:['Freezing Drizzle','rain'],57:['Freezing Drizzle','rain'],61:['Light Rain','rain'],63:['Rain','rain'],65:['Heavy Rain','rain'],
  66:['Freezing Rain','rain'],67:['Freezing Rain','rain'],71:['Light Snow','snow'],73:['Snow','snow'],75:['Heavy Snow','snow'],
  77:['Snow Grains','snow'],80:['Rain Showers','rain'],81:['Rain Showers','rain'],82:['Heavy Showers','rain'],
  85:['Snow Showers','snow'],86:['Snow Showers','snow'],95:['Thunderstorm','storm'],96:['Thunderstorm','storm'],99:['Thunderstorm','storm'],
};
const wmo = c => WMO[c] || ['&#8212;','cloud'];

const rnd = v => (v==null||isNaN(v))?'&#8212;':Math.round(v);
const clock = iso => { const d=new Date(iso); let h=d.getHours(); const ap=h>=12?'PM':'AM'; h=h%12||12; return h+' '+ap; };
const dow = iso => new Date(iso+'T00:00').toLocaleDateString('en-CA',{weekday:'short'});
const timeHM = iso => { const d=new Date(iso); if(isNaN(d)) return '';
  let h=d.getHours(); const ap=h>=12?'PM':'AM'; h=h%12||12;
  return h+':'+String(d.getMinutes()).padStart(2,'0')+ap; };
const windDir = d => (d==null) ? '' : (typeof d==='string' ? d : ['N','NE','E','SE','S','SW','W','NW'][Math.round((((d%360)+360)%360)/45)%8]);
/* ---- sunrise/sunset from lat/lon (NOAA/SunCalc method) — TWN feeds don't supply them ---- */
const _rad=Math.PI/180, _dayMs=864e5, _J1970=2440588, _J2000=2451545, _e=_rad*23.4397, _J0=0.0009;
const _toDays=d=>(d.valueOf()/_dayMs-0.5+_J1970)-_J2000;
const _fromJ=j=>new Date((j+0.5-_J1970)*_dayMs);
const _M=d=>_rad*(357.5291+0.98560028*d);
const _L=M=>M+_rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M))+_rad*102.9372+Math.PI;
const _dec=L=>Math.asin(Math.sin(_e)*Math.sin(L));
const _tr=(Ht,lw,n)=>_J0+(Ht+lw)/(2*Math.PI)+n;
const _stJ=(ds,M,L)=>_J2000+ds+0.0053*Math.sin(M)-0.0069*Math.sin(2*L);
function sunTimes(date,lat,lng){
  if(lat==null||lng==null) return {sunrise:null,sunset:null};
  const lw=_rad*-lng, phi=_rad*lat, d=_toDays(date), n=Math.round(d-_J0-lw/(2*Math.PI));
  const ds=_tr(0,lw,n), M=_M(ds), L=_L(M), dec=_dec(L), Jnoon=_stJ(ds,M,L);
  const w=Math.acos((Math.sin(-0.833*_rad)-Math.sin(phi)*Math.sin(dec))/(Math.cos(phi)*Math.cos(dec)));
  if(isNaN(w)) return {sunrise:null,sunset:null};          // polar day/night
  const Jset=_stJ(_tr(w,lw,n),M,L);
  return { sunrise:_fromJ(Jnoon-(Jset-Jnoon)), sunset:_fromJ(Jset) };
}
const sunFor = dateStr => sunTimes(new Date(dateStr+'T12:00:00'), lastCoords.lat, lastCoords.lon);

const num = s => { if(s==null) return null; const m=String(s).match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; };

async function fetchGEM(lat,lon,name){
  const qs = new URLSearchParams({
    latitude:lat, longitude:lon, models:'gem_seamless',
    current:'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_direction_10m,visibility',
    hourly:'temperature_2m,weather_code,precipitation_probability,is_day',
    daily:'weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,sunrise,sunset,uv_index_max,precipitation_sum,precipitation_probability_max,wind_speed_10m_max',
    timezone:'auto', forecast_days:10, wind_speed_unit:'kmh'
  }).toString();
  const r = await fetch('https://api.open-meteo.com/v1/forecast?'+qs);
  if(!r.ok) throw new Error('GEM '+r.status);
  return mapGEM(await r.json(), name);
}
function mapGEM(d,name){
  const cur=d.current, hr=d.hourly, dl=d.daily;
  const now=new Date();
  let s=hr.time.findIndex(t=>new Date(t)>=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours()));
  if(s<0) s=0;
  const hourly=[];
  for(let i=s;i<hr.time.length;i++){ const w=wmo(hr.weather_code[i]); const day=hr.is_day?hr.is_day[i]===1:true;
    hourly.push({ time:hr.time[i], temp:hr.temperature_2m[i], label:w[0], sky:w[1], isDay:day, pop:hr.precipitation_probability?.[i] }); }
  const daily=dl.time.map((t,i)=>{ const w=wmo(dl.weather_code[i]);
    return { date:t, label:w[0], sky:w[1], isDay:true, hi:dl.temperature_2m_max[i], lo:dl.temperature_2m_min[i],
      feelsHi:dl.apparent_temperature_max?.[i], feelsLo:dl.apparent_temperature_min?.[i],
      sunrise:dl.sunrise?.[i], sunset:dl.sunset?.[i], uv:dl.uv_index_max?.[i], precip:dl.precipitation_sum?.[i],
      pop:dl.precipitation_probability_max?.[i], windMax:dl.wind_speed_10m_max?.[i] }; });
  const cw=wmo(cur.weather_code);
  return {
    place:name||'Current Location', narrative:'', normal:null, dailyLabel:'10-Day Forecast',
    current:{ temp:cur.temperature_2m, feelsLike:cur.apparent_temperature, humidity:cur.relative_humidity_2m,
      label:cw[0], sky:cw[1], isDay:cur.is_day===1, windSpeed:cur.wind_speed_10m, windDir:cur.wind_direction_10m,
      gust:dl.wind_speed_10m_max?.[0], pressure:cur.surface_pressure, visibility:(cur.visibility!=null?cur.visibility/1000:null), cloud:cur.cloud_cover, uv:dl.uv_index_max?.[0] },
    hourly, daily, periods:[], source:'Environment Canada GEM model via Open-Meteo (raw model output)'
  };
}

function twnSky(bg,text){
  const s=((bg||'')+' '+(text||'')).toLowerCase();
  if(/thunder|tstorm/.test(s)) return 'storm';
  if(/snow|flurr|ice|sleet/.test(s)) return 'snow';
  if(/rain|shower|drizzle|precip/.test(s)) return 'rain';
  if(/fog|mist|haze/.test(s)) return 'fog';
  if(/cloud|overcast/.test(s)) return 'cloud';
  if(/clear|sunny|sun|fair/.test(s)) return 'clear';
  return 'cloud';
}
const twnIsDay = (bg,iso) => bg ? !/night/i.test(bg) : (()=>{ const h=new Date(iso).getHours(); return h>=6&&h<20; })();
const kpaToHpa = v => v==null?null:v*10;
/* TWN period object (shared by /hourly, /shortterm) -> normalized point */
const twnPoint = p => { const w=p?.weatherCode||{}; return {
  time:p?.time?.local, temp:p?.temperature?.value, feelsLike:p?.feelsLike, label:w.text,
  sky:twnSky(w.bgImage,w.text), isDay:twnIsDay(w.bgImage,p?.time?.local), pop:p?.pop,
  humidity:p?.relativeHumidity, windSpeed:p?.wind?.speed, windDir:p?.wind?.direction, gust:p?.wind?.gust,
  pressure:kpaToHpa(p?.pressure), cloud:p?.cloudCover, visibility:null, dewPoint:p?.dewPoint }; };
/* TWN /observation object (flat temp, bgimage lowercase, pressure{value}, visibility in km) */
const twnObs = o => { const w=o?.weatherCode||{}; const bg=w.bgimage||w.bgImage; return {
  time:o?.time?.local, temp:o?.temperature, feelsLike:o?.feelsLike, dewPoint:o?.dewPoint, label:w.text,
  sky:twnSky(bg,w.text), isDay:twnIsDay(bg,o?.time?.local), humidity:o?.relativeHumidity,
  windSpeed:o?.wind?.speed, windDir:o?.wind?.direction, gust:o?.wind?.gust,
  pressure:kpaToHpa(o?.pressure?.value), visibility:o?.visibility, cloud:null, uv:null }; };
const getJSON = u => fetch(u).then(r=>{ if(!r.ok) throw new Error('TWN '+r.status); return r.json(); });
/* Some Pelmorex endpoints cap `count` and 400 on large values.
   Try the requested count, then progressively smaller, then no count at all. */
async function getCounted(base, counts){
  for(const c of counts){
    try{
      const r = await getJSON(c==null ? base : `${base}&count=${c}`);
      if(c!==counts[0]) console.warn('[weather] count',counts[0],'rejected; using',c,'for',base);
      return r;
    }
    catch(e){ if(!/\b400\b/.test(e.message)) throw e; }
  }
  console.warn('[weather] all counts rejected for',base);
  return null;
}

/* Parse TWN's hourly page ld+json (CSVW table) into hourly entries (true 1-hour). */
function parseCSVW(ld){
  const cols = ld?.mainEntity?.['csvw:tableSchema']?.['csvw:columns'];
  if(!Array.isArray(cols)) return [];
  const col={}; for(const c of cols) col[c['csvw:name']]=(c['csvw:cells']||[]).map(x=>x['csvw:value']);
  return (col.time||[]).map((time,i)=>({
    time, temp:num(col.temperature?.[i]), feelsLike:num(col.feelsLike?.[i]),
    label:col.condition?.[i], sky:twnSky(null,col.condition?.[i]), isDay:twnIsDay(null,time),
    pop:num(col.pop?.[i]),
  }));
}
async function fetchTWNHourly(url){
  const r=await fetch(url); if(!r.ok) throw new Error('TWN hourly '+r.status);
  const ct=r.headers.get('content-type')||'';
  if(ct.includes('json')) return parseCSVW(await r.json());
  const html=await r.text();
  const m=html.match(/<script[^>]*hourly-weather-data-set-structured-data[^>]*>([\s\S]*?)<\/script>/);
  return m ? parseCSVW(JSON.parse(m[1])) : [];
}

async function fetchTWN(lat,lon,name){
  const c=CONFIG.twn, b=c.base;
  if(!c.shortterm) return null;
  const P=`locale=en-CA&lat=${lat}&long=${lon}&unit=metric`;
  const now=new Date();
  const [st,hr,ob,lt,av,hp] = await Promise.all([
    getCounted(`${b}${c.shortterm}?${P}`, [c.count||40, 32, c.minCount||28, null]).catch(()=>null),
    c.hourly   ? getCounted(`${b}${c.hourly}?${P}`, [c.hourCount||72, 48, 24, null]).catch(()=>null) : null,
    c.observation ? getJSON(`${b}${c.observation}?${P}`).catch(()=>null) : null,
    c.longterm ? getJSON(`${b}${c.longterm}?${P}`).catch(()=>null) : null,
    c.averages ? getJSON(`${b}${c.averages}?${P}&month=${now.getMonth()+1}&year=${now.getFullYear()}`).catch(()=>null) : null,
    c.hourlyPage ? fetchTWNHourly(c.hourlyPage.replace('{lat}',lat).replace('{lon}',lon)).catch(()=>null) : null,
  ]);
  return mapTWN({ st, hr, ob, lt, av, hp }, name);
}
function mapTWN({ st, hr, ob, lt, av, hp }, name){
  const HR = hr?.hourly || [];            // /hourly (true 1h)
  const ST = st?.shortTerm || [];         // /shortterm (6h) fallback

  // hourly strip: prefer /hourly JSON, then ld+json page scrape, then 6h shortterm
  let hourly;
  if(HR.length) hourly = HR.map(twnPoint);
  else if(hp && hp.length) hourly = hp.slice();
  else hourly = ST.map(twnPoint);

  // current: prefer LIVE measured observation, else nearest forecast hour
  if(!st && !hr && !ob && !lt) throw new Error('TWN: no feed responded');
  const O = ob?.observation;
  const cur = O ? twnObs(O) : twnPoint(HR[0] || ST[0] || {});
  if(cur.pop == null) cur.pop = HR[0]?.pop;      // observation has no POP
  if(cur.cloud == null) cur.cloud = HR[0]?.cloudCover;
  cur.uv = null;

  // longterm daily (day high / night low)
  const L = lt?.longTerm || [];
  const daily = L.slice(0,10).map(d=>{ const day=d.day||{}, night=d.night||{}, w=day.weatherCode||{};
    return { date:String(d.time?.local ?? '').slice(0,10), label:w.text, sky:twnSky(w.bgImage,w.text), isDay:true,
      hi:day.temperature?.value, lo:night.temperature?.value,
      feelsHi:day.feelsLike, feelsLo:night.feelsLike, pop:d.pop ?? day.pop,
      precip:d.rain?.value, windMax:day.wind?.speed, sunrise:null, sunset:null, uv:null }; });

  // today's climate normal
  let normal=null;
  if(av?.days){ const t=new Date().toISOString().slice(0,10);
    const m=av.days.find(x=>String(x.timestamp).slice(0,10)===t) || av.days[new Date().getDate()-1];
    if(m) normal={ hi:m.temperatureMax, lo:m.temperatureMin }; }

  return {
    place: name||'Current Location',
    narrative: '',
    normal, dailyLabel: daily.length ? `${daily.length}-Day Forecast` : '',
    current: cur, hourly, daily,
    periods: ST.map(twnPoint),          // 6h periods, 10 days — fallback for days beyond /hourly
    source:'The Weather Network / Pelmorex (personal, non-redistributed)'
  };
}

/* COMBINED: The Weather Network for conditions/temps, Environment Canada (GEM) for all
   precipitation data — chance of precipitation and precipitation amounts. */
async function fetchCombined(lat,lon,name){
  const [twn,gem] = await Promise.all([
    fetchTWN(lat,lon,name),
    fetchGEM(lat,lon,name).catch(()=>null),
  ]);
  if(!twn) return gem;
  if(!gem) return twn;

  const hKey = t => String(t||'').slice(0,13);                 // YYYY-MM-DDTHH
  const gemPop = new Map(gem.hourly.map(h=>[hKey(h.time), h.pop]));
  const gemDay = new Map(gem.daily.map(d=>[d.date, d]));
  const takePop = e => { const v=gemPop.get(hKey(e.time)); return v==null ? e : {...e, pop:v}; };

  const out = {...twn};
  out.hourly  = twn.hourly.map(takePop);
  out.periods = (twn.periods||[]).map(takePop);
  out.daily   = twn.daily.map(d=>{
    const g=gemDay.get(d.date); if(!g) return d;
    return {...d, pop: g.pop!=null?g.pop:d.pop, precip: g.precip!=null?g.precip:d.precip };
  });
  const nowPop = gemPop.get(hKey(twn.current.time)) ?? gem.current.pop;
  out.current = {...twn.current, ...(nowPop!=null?{pop:nowPop}:{})};
  out.source  = 'The Weather Network + Environment Canada precipitation';
  return out;
}

/* Reverse geocode -> a CITY name. BigDataCloud's `city`/`locality` can return a regional
   district ("Metro Vancouver"), so prefer the finer administrative levels first. */
const BAD_PLACE=/regional district|metro |metropolitan|census|division|unorganized/i;
async function reverseName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
    const j=await r.json();
    const admin=(j.localityInfo?.administrative||[])
      .filter(a=>a.name && !BAD_PLACE.test(a.name))
      .sort((a,b)=>(b.adminLevel||0)-(a.adminLevel||0));   // most specific first
    const cands=[...admin.map(a=>a.name), j.city, j.locality, j.principalSubdivision];
    return cands.find(n=>n && !BAD_PLACE.test(n)) || 'Current Location';
  }catch(e){ return 'Current Location'; }
}

/* IP-based location — what The Weather Network uses. No permission prompt, city-accurate. */
async function ipLocate(){
  const tries=[
    ['https://ipwho.is/', j=> j&&j.success!==false&&j.latitude!=null ? {lat:j.latitude, lon:j.longitude, name:j.city} : null],
    ['https://ipapi.co/json/', j=> j&&j.latitude!=null ? {lat:j.latitude, lon:j.longitude, name:j.city} : null],
    ['https://get.geojs.io/v1/ip/geo.json', j=> j&&j.latitude!=null ? {lat:+j.latitude, lon:+j.longitude, name:j.city} : null],
  ];
  for(const [url,pick] of tries){
    try{
      const r=await fetch(url); if(!r.ok) continue;
      const v=pick(await r.json());
      if(v && isFinite(v.lat) && isFinite(v.lon)) return v;
    }catch(e){}
  }
  return null;
}

/* Build fit-to-width charts: temperature (heat-coloured) + precipitation chance.
   Both are line graphs with shaded area, sparse time labels, and a labelled right axis. */
const HEAT=[[-25,240],[-10,220],[0,200],[8,165],[15,95],[21,55],[27,30],[35,0]];  // degC -> hue
function tempColor(t){                       // cold blue -> hot red
  const c=(t==null?10:t);
  if(c<=HEAT[0][0]) return `hsl(${HEAT[0][1]},85%,62%)`;
  for(let i=1;i<HEAT.length;i++){
    if(c<=HEAT[i][0]){
      const [a,ha]=HEAT[i-1], [b,hb]=HEAT[i];
      const hue=ha+((c-a)/(b-a))*(hb-ha);
      return `hsl(${hue.toFixed(0)},85%,62%)`;
    }
  }
  return `hsl(0,85%,62%)`;
}
function niceTicks(min,max,want){
  const span=Math.max(1e-6,max-min), raw=span/Math.max(1,want-1);
  const mag=Math.pow(10,Math.floor(Math.log10(raw)));
  const step=[1,2,2.5,5,10].map(m=>m*mag).find(v=>v>=raw)||10*mag;
  const lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step;
  const out=[]; for(let v=lo;v<=hi+step/2;v+=step) out.push(+v.toFixed(6));
  return out;
}
const hourOf = iso => { const d=new Date(iso); return isNaN(d)?null:d.getHours(); };
const tickLabel = iso => { const h=hourOf(iso);
  return h===0?'12 AM':h===6?'6 AM':h===12?'12 PM':h===18?'6 PM':null; };

function lineChart(H,opts){
  const {key,heading,unit,fixed,colorByValue,stroke,axisMin,axisMax}=opts;
  const vals=H.map(h=>h[key]).filter(v=>v!=null);
  if(vals.length<2) return '';
  const VW=340, L=6, R=298, AX=304;            // plot area + axis label column
  const TOP=8, PH=78, BOT=PH+TOP, VH=BOT+18;   // plot band + room for time labels
  let vmin = axisMin!=null?axisMin:Math.min(...vals);
  let vmax = axisMax!=null?axisMax:Math.max(...vals);
  if(axisMin==null && axisMax==null){ const pad=Math.max(1,(vmax-vmin)*0.15); vmin-=pad; vmax+=pad; }
  const ticks = fixed || niceTicks(vmin,vmax,4);
  vmin=Math.min(vmin,...ticks); vmax=Math.max(vmax,...ticks);
  const span=Math.max(1e-6,vmax-vmin);
  const n=H.length;
  const x=i=>L+(n===1?0:(i/(n-1))*(R-L));
  const y=v=>TOP+PH-((v-vmin)/span)*PH;

  const pts=H.map((h,i)=>h[key]==null?null:[x(i),y(h[key]),(h.tempC!=null?h.tempC:h[key])]).filter(Boolean);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${TOP+PH} L${pts[0][0].toFixed(1)} ${TOP+PH} Z`;
  const uid='c'+Math.random().toString(36).slice(2,8);

  // stroke: either a value-mapped gradient (temperature) or a flat colour
  let strokeDef='', strokeRef=stroke||'#8fd0ff';
  if(colorByValue){
    const stops=pts.map((p,i)=>`<stop offset="${(pts.length===1?0:i/(pts.length-1))*100}%" stop-color="${tempColor(p[2])}"/>`).join('');
    strokeDef=`<linearGradient id="s${uid}" gradientUnits="userSpaceOnUse" x1="${L}" y1="0" x2="${R}" y2="0">${stops}</linearGradient>`;
    strokeRef=`url(#s${uid})`;
  }
  const fillTop = colorByValue ? tempColor(Math.max(...vals)) : (stroke||'#8fd0ff');

  const grid=ticks.map(t=>`<line x1="${L}" y1="${y(t).toFixed(1)}" x2="${R}" y2="${y(t).toFixed(1)}" stroke="rgba(255,255,255,.10)" stroke-width="1"/>`).join('');
  const axis=ticks.map(t=>`<text x="${AX}" y="${(y(t)+3.5).toFixed(1)}" fill="var(--ink-dim)" font-size="9.5">${Math.round(t)}${unit}</text>`).join('');
  const times=H.map((h,i)=>{ const lb=tickLabel(h.time); return lb?
    `<line x1="${x(i).toFixed(1)}" y1="${TOP}" x2="${x(i).toFixed(1)}" y2="${TOP+PH}" stroke="rgba(255,255,255,.10)" stroke-width="1"/>
     <text x="${x(i).toFixed(1)}" y="${BOT+13}" text-anchor="middle" fill="var(--ink-dim)" font-size="9.5">${lb}</text>`:''; }).join('');

  return `<div class="cap" style="padding:10px 0 2px">${heading}</div>
    <svg class="chart" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none">
      <defs>${strokeDef}
        <linearGradient id="f${uid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${fillTop}" stop-opacity=".40"/>
          <stop offset="100%" stop-color="${fillTop}" stop-opacity="0"/>
        </linearGradient></defs>
      ${grid}${times}
      <path d="${area}" fill="url(#f${uid})"/>
      <path d="${line}" fill="none" stroke="${strokeRef}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      ${axis}
    </svg>`;
}

/* Row of weather icons above the temp graph — 12 of them (one per 2 hours on a 24h day),
   positioned to line up with the chart's x-scale. */
function iconRow(H){
  const n=H.length; if(!n) return '';
  const VW=340, L=6, R=298;
  // Select by CLOCK TIME, not index: one icon every 2 hours. A partial day simply gets
  // fewer icons at correct spacing, instead of 12 crammed into a short span.
  const hr=t=>{ const v=+String(t).slice(11,13); return isNaN(v)?null:v; };
  let idx=H.map((h,i)=>i).filter(i=>{ const h=hr(H[i].time); return h!=null && h%2===0; });
  if(!idx.length) idx=H.map((_,i)=>i);              // odd/unknown timestamps: fall back to all
  if(idx.length>12){                                 // never more than 12
    const step=idx.length/12;
    idx=Array.from({length:12},(_,k)=>idx[Math.floor(k*step)]);
  }
  const cells=idx.map(i=>{
    const x=L+(n===1?0:(i/(n-1))*(R-L));
    return `<div class="ic" style="left:${(x/VW*100).toFixed(3)}%">${skyIconFor(H[i].sky,H[i].isDay,H[i].label)}</div>`;
  }).join('');
  return `<div class="iconrow">${cells}</div>`;
}

function lineChartWithIcons(H,opts){
  const svg=lineChart(H,opts);
  if(!svg) return '';
  const capEnd=svg.indexOf('</div>')+6;                 // insert icons just after the heading
  return svg.slice(0,capEnd)+iconRow(H)+svg.slice(capEnd);
}

function buildCharts(H,heading){
  if(!H || H.length<2) return '';
  const t=lineChartWithIcons(H,{ key:'temp', heading:(heading||'Hourly')+' \u00b7 Temperature', unit:'\u00b0', colorByValue:true });
  const p=H.some(h=>h.pop!=null)
    ? lineChart(H,{ key:'pop', heading:'Chance of Precipitation', unit:'%', stroke:'#8fd0ff',
                    axisMin:0, axisMax:100, fixed:[0,25,50,75,100] })
    : '';
  return t+p;
}

function render(f){
  f=toDisplayUnits(f);
  const c=f.current; paint(c.sky,c.isDay); BG.set(c.sky,c.isDay,c.cloud);
  const d0=f.daily[0]||{};
  /* ---- daily rows: lo and hi flanking the bar, click to expand ---- */
  let dailyCard='';
  if(f.daily.length){
    const los=f.daily.map(d=>d.lo).filter(v=>v!=null), his=f.daily.map(d=>d.hi).filter(v=>v!=null);
    const gmin=Math.min(...los), gmax=Math.max(...his), span=Math.max(1,gmax-gmin);
    const nowT=f.current.temp;
    const rows=f.daily.map((d,i)=>{
      const left=d.lo==null?0:((d.lo-gmin)/span)*100, width=(d.lo==null||d.hi==null)?8:Math.max(8,((d.hi-d.lo)/span)*100);
      const dotPct=(i===0&&nowT!=null&&d.lo!=null&&d.hi!=null&&nowT>=d.lo&&nowT<=d.hi)?((nowT-gmin)/span)*100:null;
      return `<div class="day" data-i="${i}"><div class="dn">${i===0?'Today':dow(d.date)}</div>
        <div class="di">${skyIconFor(d.sky,true,d.label)}</div>
        <div class="lo">${rnd(d.lo)}&deg;</div>
        <div class="track"><div class="fill" style="left:${left}%;width:${width}%"></div>${dotPct!=null?`<div class="dot" style="left:${dotPct}%"></div>`:''}</div>
        <div class="hi">${rnd(d.hi)}&deg;</div></div>
        <div class="dayx" id="dx${i}" style="display:none"></div>`;
    }).join('');
    dailyCard=`<div class="card"><div class="cap">${f.dailyLabel}</div>${rows}</div>`;
  }

  // "Now" = the live observation, not the next forecast hour. The feeds start at the next
  // hour boundary, so filter those to strictly-future and prepend a real current cell.
  const nowTs=Date.now();
  const future=f.hourly.filter(h=>{ const t=new Date(h.time).getTime(); return isFinite(t) && t>nowTs; });
  const nowCell={ time:(c.time||new Date().toISOString()), temp:c.temp, sky:c.sky, isDay:c.isDay,
                  label:c.label, pop:(future[0]?future[0].pop:null) };
  const H24=[nowCell, ...future].slice(0,24);
  const items=H24.map((h,i)=>({ t:(i===0?nowTs:new Date(h.time).getTime()), kind:'hour', h, i }));
  if(H24.length){
    const t0=items[0].t, tN=items[items.length-1].t;
    const dates=[...new Set(H24.map(h=>String(h.time).slice(0,10)))];
    for(const dstr of dates){
      const st=sunFor(dstr);
      for(const [k,v] of [['Sunrise',st.sunrise],['Sunset',st.sunset]]){
        if(v && v.getTime()>=t0 && v.getTime()<=tN) items.push({ t:v.getTime(), kind:'sun', k, v });
      }
    }
    items.sort((a,b)=>a.t-b.t);
  }
  const strip=items.map(it=> it.kind==='hour'
    ? `<div class="hour">
        <div class="h">${it.i===0?'Now':clock(it.h.time)}</div>
        <div class="i">${skyIconFor(it.h.sky,it.h.isDay,it.h.label)}</div>
        <div class="p">${it.h.pop>=15?it.h.pop+'%':''}</div>
        <div class="t">${rnd(it.h.temp)}&deg;</div></div>`
    : `<div class="hour sunev">
        <div class="h">${timeHM(it.v)}</div>
        <div class="i">${SUN_EV(it.k==='Sunrise')}</div>
        <div class="p"></div>
        <div class="t">${it.k}</div></div>`).join('');

  const uv=d0.uv, uvNote=uv==null?'':(uv<3?'Low':uv<6?'Moderate':uv<8?'High':uv<11?'Very High':'Extreme');
  const vis=c.visibility;   // km (normalized at map time for both sources)
  // sunrise/sunset: use the feed's values when present, else compute from lat/lon
  const _sf=d0.date?sunFor(d0.date):{sunrise:null,sunset:null};
  const SR={ rise:d0.sunrise||_sf.sunrise, set:d0.sunset||_sf.sunset };
  app.innerHTML=`
    <div class="hero">
      <div class="city">${f.place}</div>
      <div class="temp">${rnd(c.temp)}&deg;</div>
      <div class="cond">${c.label||''}</div>
      <div class="hl">H:${rnd(d0.hi)}&deg;&nbsp;&nbsp;L:${rnd(d0.lo)}&deg;</div>
      ${(c.feelsLike!=null && Math.round(c.feelsLike)!==Math.round(c.temp))
        ? `<div class="feels">Feels like ${rnd(c.feelsLike)}&deg;</div>` : ''}
      ${f.normal?`<div style="font-size:13px;color:var(--ink-faint);margin-top:2px">Normal ${rnd(f.normal.hi)}&deg; / ${rnd(f.normal.lo)}&deg;</div>`:''}
    </div>
    ${f.narrative?`<div class="card"><div class="cap">Forecast</div><div class="narr">${f.narrative}</div></div>`:''}
    ${f.hourly.length?`<div class="card"><div class="cap">Hourly Forecast</div><div class="hourly">${strip}</div></div>`:''}
    ${dailyCard}
    <div class="tiles">
      <div class="tile"><div class="cap">Feels Like</div><div class="big">${rnd(c.feelsLike)}&deg;</div><div class="note">Actual ${rnd(c.temp)}&deg;</div></div>
      <div class="tile"><div class="cap">Precip Today</div><div class="big">${d0.precip==null?'&#8212;':(+d0.precip).toFixed(U().precipDp)} ${U().precip}</div><div class="note">${d0.pop!=null?d0.pop+'% chance':''}</div></div>
      <div class="tile"><div class="cap">Wind</div><div class="big">${rnd(c.windSpeed)} <span style="font-size:15px">${U().wind}</span></div><div class="note">${windDir(c.windDir)} &middot; gusts ${rnd(c.gust)}</div></div>
      <div class="tile"><div class="cap">Humidity</div><div class="big">${rnd(c.humidity)}%</div><div class="note">Cloud ${rnd(c.cloud)}%</div></div>
      ${(uv==null && c.dewPoint!=null)
        ? `<div class="tile"><div class="cap">Dew Point</div><div class="big">${rnd(c.dewPoint)}&deg;</div><div class="note">Humidity ${rnd(c.humidity)}%</div></div>`
        : `<div class="tile"><div class="cap">UV Index</div><div class="big">${uv==null?'&#8212;':Math.round(uv)}</div><div class="note">${uvNote}</div></div>`}
      <div class="tile"><div class="cap">Visibility</div><div class="big">${vis==null?'&#8212;':vis.toFixed(0)} <span style="font-size:15px">${U().vis}</span></div><div class="note"></div></div>
      <div class="tile"><div class="cap">Sunrise</div><div class="big">${SR.rise?timeHM(SR.rise):'&#8212;'}</div><div class="note">${SR.set?'Sunset '+timeHM(SR.set):''}</div></div>
      <div class="tile"><div class="cap">Pressure</div><div class="big">${c.pressure==null?'&#8212;':(+c.pressure).toFixed(U().pressDp)}</div><div class="note">${U().press}</div></div>
    </div>`;
  $('#foot').innerHTML='Source: '+f.source+(c.time?' &middot; observed '+timeHM(c.time):'');
  CURRENT_F=f;
  enhanceScroll();
  wireDays();
}

function setupCard(){
  app.innerHTML=`<div class="setup"><b>Connect The Weather Network</b><br><br>
    Pelmorex's API is public with wildcard CORS &mdash; no proxy, no login. The <code>shortterm</code>,
    <code>longterm</code> and <code>averages</code> feeds are pre-filled. If this card shows,
    <code>CONFIG.twn.shortterm</code> is blank &mdash; refill it and reload.</div>`;
  $('#foot').innerHTML='';
}

let lastLoadTs=0;
async function load(lat,lon,name,remember){
  lastCoords={lat,lon,name};
  if(remember!==false) savePrefs({ lat, lon, name: name||null });
  app.innerHTML='<div class="msg"><div class="spinner"></div>Loading forecast&#8230;</div>';
  try{
    if(!name) name=await reverseName(lat,lon);
    let f;
    if(CONFIG.source==='twn'){ f=await fetchTWN(lat,lon,name); if(!f){ setupCard(); return; } }
    else if(CONFIG.source==='comb'){ f=await fetchCombined(lat,lon,name); if(!f){ setupCard(); return; } }
    else { f=await fetchGEM(lat,lon,name); }
    CURRENT_RAW=f;
    lastLoadTs=Date.now();
    render(f);
  }catch(e){ app.innerHTML=`<div class="msg">Couldn't load the forecast.<br><small style="color:var(--ink-faint)">${e.message}</small></div>`; }
}

function markSource(src){
  $('#src-twn').classList.toggle('on',src==='twn');
  $('#src-gem').classList.toggle('on',src==='gem');
  $('#src-comb').classList.toggle('on',src==='comb');
}
function setSource(src){
  CONFIG.source=src; savePrefs({ source:src }); markSource(src);
  load(lastCoords.lat,lastCoords.lon,lastCoords.name);
}
$('#src-gem').addEventListener('click',()=>setSource('gem'));
$('#src-twn').addEventListener('click',()=>setSource('twn'));
$('#src-comb').addEventListener('click',()=>setSource('comb'));

function markUnit(u){
  $('#u-c').classList.toggle('on',u==='C');
  $('#u-f').classList.toggle('on',u==='F');
}
function setUnit(u){
  if(u===UNIT) return;
  UNIT=u; savePrefs({ unit:u }); markUnit(u);
  if(CURRENT_F) render(CURRENT_RAW || CURRENT_F);       // re-render from the metric original
}
$('#u-c').addEventListener('click',()=>setUnit('C'));
$('#u-f').addEventListener('click',()=>setUnit('F'));

function enhanceScroll(){
  document.querySelectorAll('.cscroll, .hourly').forEach(el=>{
    el.addEventListener('wheel',e=>{ if(e.deltaY!==0){ el.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
    let down=false,sx=0,sl=0;
    el.addEventListener('pointerdown',e=>{ if(e.pointerType!=='mouse')return; down=true; sx=e.clientX; sl=el.scrollLeft; el.classList.add('drag'); });
    window.addEventListener('pointermove',e=>{ if(!down)return; el.scrollLeft=sl-(e.clientX-sx); });
    window.addEventListener('pointerup',()=>{ down=false; el.classList.remove('drag'); });
  });
}

/* hours belonging to one calendar date -> charts (empty if outside forecast range) */
function hoursFor(date){
  if(!date || !CURRENT_F) return '';
  const onDate=arr=>(arr||[]).filter(h=>String(h.time||'').slice(0,10)===date);
  const hourOfStr=t=>+String(t).slice(11,13);
  const today=new Date(); const todayStr=today.getFullYear()+'-'+
    String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  const H=onDate(CURRENT_F.hourly);
  const P=onDate(CURRENT_F.periods);
  // Hourly is preferred, but only if it actually covers the day. The 72h window ends
  // mid-day on the 4th day, so that day's hourly is truncated (misses the afternoon peak)
  // — fall back to the 6-hour periods, which span the whole day.
  const covers = H.length>=2 && (date===todayStr || hourOfStr(H[H.length-1].time)>=20);
  if(covers) return buildCharts(H,'Hourly');
  if(P.length>=2) return buildCharts(P,'6-Hour Periods');
  if(H.length>=2) return buildCharts(H,'Hourly (partial)');
  return '<div class="nohr">No sub-daily detail available for this day.</div>';
}

/* click a day -> Apple-style expanded detail */
function wireDays(){
  document.querySelectorAll('.day').forEach(row=>{
    row.addEventListener('click',()=>{
      const i=+row.dataset.i, box=document.getElementById('dx'+i);
      if(!box) return;
      const open = box.style.display!=='none';
      document.querySelectorAll('.dayx').forEach(b=>b.style.display='none');
      if(open) return;
      const d=CURRENT_F?.daily?.[i]; if(!d) return;
      const r=(k,v,cls)=> v==null||v===''?'':`<div class="r${cls?' '+cls:''}"><span>${k}</span><span>${v}</span></div>`;
      const _s=sunFor(d.date);
      const ds={ rise:d.sunrise||_s.sunrise, set:d.sunset||_s.sunset };
      box.innerHTML=`<div class="cond">${d.label||''}</div><div class="grid">
        ${r('Chance of rain',d.pop!=null?d.pop+'%':null)}
        ${r('Precipitation',d.precip!=null?(+d.precip).toFixed(U().precipDp)+' '+U().precip:null)}
        ${r('Sunrise',ds.rise?timeHM(ds.rise):null,'sr')}
        ${r('Sunset',ds.set?timeHM(ds.set):null)}
        ${r('Feels like', (d.feelsHi!=null||d.feelsLo!=null)
              ? [d.feelsHi!=null?rnd(d.feelsHi)+'\u00b0':null, d.feelsLo!=null?rnd(d.feelsLo)+'\u00b0':null]
                .filter(Boolean).join(' / ') : null)}
        ${r('Wind',d.windMax!=null?rnd(d.windMax)+' '+U().wind:null)}
        ${r('UV index',d.uv!=null?Math.round(d.uv):null)}
      </div>${hoursFor(d.date)}`;
      box.style.display='block';
      enhanceScroll();
    });
  });
}

let tmr;
$('#q').addEventListener('input',e=>{
  clearTimeout(tmr); const v=e.target.value.trim();
  if(v.length<2){ $('#results').style.display='none'; return; }
  tmr=setTimeout(async()=>{
    try{ const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=6&language=en&format=json`);
      const j=await r.json(); const box=$('#results');
      if(!j.results){ box.style.display='none'; return; }
      box.innerHTML=j.results.map(p=>{ const sub=[p.admin1,p.country].filter(Boolean).join(', ');
        return `<button data-lat="${p.latitude}" data-lon="${p.longitude}" data-name="${p.name.replace(/"/g,'')}">${p.name} <span class="sub">${sub}</span></button>`; }).join('');
      box.style.display='block';
    }catch(err){}
  },250);
});
$('#results').addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  closeSearch(); $('#q').value=b.dataset.name; load(+b.dataset.lat,+b.dataset.lon,b.dataset.name); });
document.addEventListener('click',e=>{
  if(!e.target.closest('.topbar')) closeSearch();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSearch(); });

/* The button asks the browser for precise GPS (prompts). Falls back to IP if denied. */
/* collapsed search: the magnifier expands the field; picking a result,
   tapping away, or pressing Esc collapses it again. */
function openSearch(){
  $('#topbar').classList.add('open');
  const q=$('#q'); q.focus(); q.select();
}
function closeSearch(){
  $('#topbar').classList.remove('open');
  $('#results').style.display='none';
}
$('#btn-search').addEventListener('click',openSearch);
$('#geo').addEventListener('click',useGeo);
$('#clear').addEventListener('click',()=>{
  const q=$('#q'); q.value=''; $('#results').style.display='none'; q.focus();
});
function useGeo(){
  closeSearch();
  if(!navigator.geolocation){ return autoLocate(); }
  app.innerHTML='<div class="msg"><div class="spinner"></div>Finding your location&#8230;</div>';
  navigator.geolocation.getCurrentPosition(
    p=>load(p.coords.latitude,p.coords.longitude,null),
    ()=>autoLocate(),                                   // denied/failed -> IP, never a hardcoded guess
    {timeout:8000,maximumAge:600000,enableHighAccuracy:true});
}

/* Startup location: IP first — no permission prompt, same approach TWN uses. */
async function autoLocate(){
  app.innerHTML='<div class="msg"><div class="spinner"></div>Finding your location&#8230;</div>';
  const ip=await ipLocate();
  if(ip){ load(ip.lat, ip.lon, ip.name||null); return; }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p=>load(p.coords.latitude,p.coords.longitude,null),
      ()=>{ app.innerHTML='<div class="msg">Couldn\'t determine your location.<br>Search for a city above.</div>'; },
      {timeout:8000,maximumAge:600000});
  } else {
    app.innerHTML='<div class="msg">Couldn\'t determine your location.<br>Search for a city above.</div>';
  }
}

/* ============ refresh: on reopen, on a timer, and by pull-down ============ */
const STALE_MS = 10*60*1000;                 // data older than this is refetched on reopen
let refreshing=false;

async function refresh(force){
  if(refreshing) return;
  if(lastCoords.lat==null) return;                       // nothing loaded yet
  if(!force && Date.now()-lastLoadTs < STALE_MS) return; // still fresh
  refreshing=true;
  const ptr=$('#ptr'); ptr.classList.add('spin'); ptr.style.opacity='1'; ptr.style.transform='translateY(0)';
  try{ await load(lastCoords.lat,lastCoords.lon,lastCoords.name,false); }
  finally{
    refreshing=false;
    ptr.classList.remove('spin'); ptr.style.opacity='0'; ptr.style.transform='translateY(-42px)';
  }
}

// reopened from the background / another tab / bfcache
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refresh(false); });
addEventListener('pageshow',e=>{ if(e.persisted) refresh(false); });
addEventListener('focus',()=>refresh(false));
// and while it sits open
setInterval(()=>{ if(!document.hidden) refresh(false); }, 5*60*1000);

/* ---- pull-to-refresh (touch). Listeners are passive so the native
   rubber-band springiness is preserved. ---- */
(function pullToRefresh(){
  const ptr=$('#ptr'); const TH=72; let y0=null, dist=0, active=false;
  const atTop=()=>(window.scrollY||document.documentElement.scrollTop||0)<=0;
  addEventListener('touchstart',e=>{
    if(e.touches.length!==1 || !atTop() || refreshing){ y0=null; return; }
    y0=e.touches[0].clientY; dist=0; active=false;
  },{passive:true});
  addEventListener('touchmove',e=>{
    if(y0==null || refreshing) return;
    const d=e.touches[0].clientY-y0;
    if(d>6 && atTop()){
      active=true;
      dist=Math.min(130,d);
      const p=Math.min(1,dist/TH);
      ptr.style.opacity=p.toFixed(2);
      ptr.style.transform=`translateY(${(dist*0.42-42).toFixed(1)}px)`;
      ptr.querySelector('.ring').style.transform=`rotate(${(dist*3).toFixed(0)}deg)`;
    }
  },{passive:true});
  function end(){
    if(y0==null) return;
    const go = active && dist>=TH;
    y0=null; active=false;
    if(go){ refresh(true); }
    else { ptr.style.opacity='0'; ptr.style.transform='translateY(-42px)'; }
    dist=0;
  }
  addEventListener('touchend',end,{passive:true});
  addEventListener('touchcancel',end,{passive:true});
})();

/* ---- startup: restore saved source + city, else ask for location ---- */
(function start(){
  const pr=loadPrefs();
  if(pr.source==='gem'||pr.source==='twn'||pr.source==='comb'){
    CONFIG.source=pr.source; markSource(pr.source);
  }
  if(pr.unit==='C'||pr.unit==='F'){ UNIT=pr.unit; }
  markUnit(UNIT);
  if(typeof pr.lat==='number' && typeof pr.lon==='number'){
    if(pr.name) $('#q').value=pr.name;
    load(pr.lat,pr.lon,pr.name||null);
  } else {
    autoLocate();
  }
})();
</script>
